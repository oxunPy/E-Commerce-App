spring:
  application:
    name: notification-service

  data:
    mongodb:
      auto-index-creation: true

  mongodb:
    host: ${MONGO_HOST:localhost}
    port: ${MONGO_PORT:27017}
    database: ${MONGO_DB:notifications_db}
    username: ${MONGO_USER}
    password: ${MONGO_PASSWORD}
    authentication-database: admin

logging:
  level:
    root: info
    com.simplecoding.notificationservice: debug

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - health
          - info
          - metrics
          - prometheus
          - loggers

server:
  port: 8083