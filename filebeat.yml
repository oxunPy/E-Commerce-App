# =============================================================================
# FILEBEAT - ЛЁГКИЙ СБОРЩИК ЛОГОВ
# =============================================================================
# Filebeat устанавливается на каждом узле (сервере) и собирает логи со всех
# контейнеров Docker, добавляет метаданные и отправляет в Logstash.
#
# ВНИМАНИЕ: Все параметры реально существуют, но их работа зависит от:
#   - версии Filebeat (7.x, 8.x)
#   - способа запуска (Docker, binary)
#   - прав доступа к файлам и Docker socket
#   - конфигурации Docker (драйвер логирования)
#   - наличия других процессоров и выходов
# =============================================================================

# -----------------------------------------------------------------------------
# INPUTS - ОТКУДА ЧИТАЕМ ЛОГИ
# -----------------------------------------------------------------------------
filebeat.inputs:
  # Тип "container" – специально для Docker контейнеров
  - type: container

    #     Начиная с Filebeat 8.x тип container считается устаревающим (deprecated).
    #     Рекомендуется использовать filestream + docker parser, но container
    #     продолжает работать в 8.11 и будет поддерживаться ещё некоторое время.
    enabled: true

    # -------------------------------------------------------------------------
    # PATHS - где искать файлы логов
    # -------------------------------------------------------------------------
    # Docker (с драйвером json-file) хранит логи каждого контейнера в файле:
    # /var/lib/docker/containers/[CONTAINER_ID]/[CONTAINER_ID]-json.log
    paths:
      - /var/lib/docker/containers/*/*.log
      # * - подстановка ID контейнера и имени файла.
      #
      #   ️  Этот путь должен быть доступен внутри контейнера Filebeat.
      #     Для этого необходимо смонтировать директорию /var/lib/docker/containers
      #     хоста в контейнер (volume). Без монтирования логи читаться не будут.
      #
      # Альтернативные пути:
      # - /var/log/*.log                          # Логи приложений на хосте
      # - /var/log/nginx/access.log                # Конкретный файл
      # - /var/log/**/*.log                         # Рекурсивно все .log файлы
      # - /mnt/logs/*.log                           # На внешнем диске
      #
      # Для Kubernetes (при использовании Docker-совместимого runtime):
      # - /var/log/pods/*/*/*.log                  # Логи подов Kubernetes
      #   Но в k8s чаще применяют autodiscover, а не прямые пути.

    # -------------------------------------------------------------------------
    # EXCLUDE_FILES - исключаем ненужные файлы
    # -------------------------------------------------------------------------
    # exclude_files: ['\.gz$']                     # Исключить сжатые файлы
    # exclude_files: ['filebeat.*log$']             # Исключить логи самого Filebeat

    # -------------------------------------------------------------------------
    # MULTILINE - объединение многострочных логов (например, стектрейсы)
    # -------------------------------------------------------------------------
    # multiline:
    #   type: pattern
    #   pattern: '^\s'                              # Строки, начинающиеся с пробела
    #   negate: false
    #   match: after                                 # присоединяем к предыдущей строке
    #
    # Для Java stacktrace лучше использовать:
    #   pattern: '^[[:space:]]+(at|\.{3})\s|^Caused by:'
    #   negate: false
    #   match: after

# -----------------------------------------------------------------------------
# PROCESSORS - ОБРАБОТКА ЛОГОВ ПЕРЕД ОТПРАВКОЙ
# -----------------------------------------------------------------------------
#     Процессоры могут быть объявлены на двух уровнях:
#      - глобально (под ключом processors:) – применяются ко всем входам
#      - внутри конкретного input – применяются только к этому input.
#     Оба варианта валидны.
processors:

  # -------------------------------------------------------------------------
  # 1. ADD_DOCKER_METADATA - добавляет информацию о контейнере
  # -------------------------------------------------------------------------
  - add_docker_metadata:
      # Адрес Docker socket для получения метаданных.
      #  Требуется монтирование /var/run/docker.sock в контейнер Filebeat.
      host: "unix:///var/run/docker.sock"
      # Альтернативы:
      # host: "tcp://docker:2375"                  # Удаленный Docker (с TLS)
      #
      # Добавляемые поля (пример):
      # - container.id
      # - container.name
      # - container.image.name
      # - container.labels
      #
      # Дополнительные настройки (опционально):
      # match_fields: ["container.id"]              # Только ID
      # source_index: 2                             # Индекс в имени контейнера
      # match_source: true
      #
      # Может также добавить поля хоста (host.name, host.ip и др.)

  # -------------------------------------------------------------------------
  # 2. DROP_EVENT - фильтрация событий по условиям
  # -------------------------------------------------------------------------
  - drop_event:
      when:
        not:
          or:
            - equals:
                container.name: "order_service"
            - equals:
                container.name: "notification_service"
            - equals:
                container.name: "payment_service"
            - equals:
                container.name: "inventory_service"
            - equals:
                container.name: "product_service"
      # Условие: оставляем только события от указанных контейнеров.
      #
      # Другие возможные условия (все реально работают):
      #   - equals: { "field": "value" }
      #   - contains: { "field": "substring" }
      #   - regexp: { "field": "pattern" }
      #   - range: { "field": { "gte": 500, "lt": 1000 } }
      #   - has_fields: ["field1", "field2"]
      #
      # Примеры:
      # - drop_event:
      #     when:
      #       contains:
      #         message: "/health"          # Исключить healthcheck-логи
      #
      # - drop_event:
      #     when:
      #       not:
      #         equals:
      #           level: "ERROR"            # Оставить только ошибки

  # -------------------------------------------------------------------------
  # 3. DECODE_JSON_FIELDS - парсинг JSON-строк в поля
  # -------------------------------------------------------------------------
  - decode_json_fields:
      # Поля, которые нужно попытаться распарсить как JSON.
      fields: ["message"]
      #     В зависимости от типа input, содержимое лога может находиться
      #     в разных полях. Для container input Filebat часто помещает сырую
      #     строку лога (включая обёртку Docker) именно в поле message.
      #
      # target – куда сохранить распарсенные поля.
      target: ""
      # "" - поля распарсенного объекта помещаются в корень документа.
      # Варианты:
      #   target: "json"        # Поля будут вложены в объект json
      #   target: "parsed"      # В объект parsed
      #
      # overwrite_keys: перезаписывать существующие поля корня.
      overwrite_keys: true
      #   ️  Может перезаписать важные поля (@timestamp, message), если они
      #     присутствуют в распарсенном JSON. В некоторых случаях это желательно,
      #     в других – лучше использовать target и переименовывать позже.
      #
      # add_error_key: добавлять тег _jsonparsefailure при ошибке парсинга.
      add_error_key: true
      # when – применять процессор только к определённым событиям.
      when:
        regexp:
          message: '^\s*\{'
          # Регулярное выражение проверяет, что строка начинается с '{'
          # (возможно с пробелами). Это уменьшает нагрузку на не-JSON логи.
      #
      # Другие опции:
      #   max_depth: 2          # Глубина парсинга вложенных объектов
      #   document_id: "id"     # Использовать поле id как _id документа
      #   process_array: false  # Не парсить массивы как отдельные события

  # -------------------------------------------------------------------------
  # 4. DROP_FIELDS - удаление ненужных полей
  # -------------------------------------------------------------------------
  - drop_fields:
      fields: ["stream", "attrs"]
      # stream – обычно содержит "stdout"/"stderr" (не критично для поиска)
      # attrs – дополнительные атрибуты Docker (часто пустые)
      #
      #     Удаление полей может нарушить совместимость с ECS (Elastic Common Schema).
      #     В production часто оставляют такие поля, как agent, ecs.version, input.type,
      #     так как они помогают идентифицировать источник данных.
      #
      # Другие поля, которые можно удалить (если не нужны):
      #   - "log"               # сырой лог Docker (после декодирования)
      #   - "container.labels"  # если не используются
      #   - "host.hostname"     # если не нужно знать хост
      #   - "agent"             # служебные поля Filebeat
      #   - "ecs.version"       # версия ECS
      #
      # Опция ignore_missing: true – не выдавать ошибку, если поля нет.

# -----------------------------------------------------------------------------
# OUTPUT - КУДА ОТПРАВЛЯЕМ ЛОГИ
# -----------------------------------------------------------------------------
#     Filebeat может использовать только один активный output.
#     Если указано несколько, он выберет последний (или выдаст ошибку).
output.logstash:
  # Адрес Logstash (может быть несколько для балансировки).
  hosts: ["logstash:5000"]
  # Варианты:
  # hosts: ["logstash1:5000", "logstash2:5000"]
  # hosts: ["192.168.1.100:5000"]

  # Дополнительные настройки (опционально):
  # worker: 2                     # Количество потоков отправки
  # bulk_max_size: 2048           # Событий в одной партии
  # compression_level: 3          # Сжатие (1-9)
  # loadbalance: true             # Балансировка между хостами
  # ttl: 30                       # Время жизни соединения (сек)
  # timeout: 30                    # Таймаут отправки
  # backoff.init: 1                # Начальная задержка при ошибке
  # backoff.max: 60                # Максимальная задержка при ошибке

# -----------------------------------------------------------------------------
# АЛЬТЕРНАТИВНЫЕ OUTPUTS (приведены для справки, одновременно не используются)
# -----------------------------------------------------------------------------
# output.elasticsearch:                              # Прямо в Elasticsearch
#   hosts: ["elasticsearch:9200"]
#   index: "filebeat-%{[container.name]}-%{+yyyy.MM.dd}"
#
# output.console:                                    # В консоль (отладка)
#   pretty: true
#   codec.json:
#     pretty: true
#
# output.kafka:                                       # В Kafka
#   hosts: ["kafka:9092"]
#   topic: "orderhub-logs"
#   codec.json: {}
#
# output.file:                                        # В файл
#   path: "/tmp/filebeat"
#   filename: "filebeat"

# -----------------------------------------------------------------------------
# НАСТРОЙКИ ЛОГИРОВАНИЯ САМОГО FILEBEAT
# -----------------------------------------------------------------------------
# logging.level: info                                 # Уровень логов
# logging.selectors: ["*"]                            # Детальные логи (для отладки)
# logging.to_files: false                              # Не писать в файлы
# logging.to_stderr: true                              # Писать в stderr (в Docker удобно)
# logging.files:
#   path: /var/log/filebeat
#   name: filebeat.log
#   keepfiles: 7
#   permissions: 0644
# =============================================================================
