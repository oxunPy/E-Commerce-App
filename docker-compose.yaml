services:
  orders-db-postgres:
    image: postgres:15
    container_name: orders_db_postgres
    ports:
      - "${ORDERS_POSTGRES_PORT:-5433}:5432"

    environment:
      POSTGRES_USER: ${ORDERS_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${ORDERS_POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${ORDERS_POSTGRES_DB:-orders_db}

    volumes:
      - orders_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

    command:
      - "postgres"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "shared_buffers=256MB"      # Кэш в памяти (ускоряет запросы)
      - "-c"
      - "wal_level=logical"

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-orders_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - e-commerce-network

  order-service:
    build:
      context: .      # Текущая директория
      dockerfile: order-service/Dockerfile
      args:
        # Аргументы сборки (только метаинформация, НЕ секреты!)
        APP_VERSION: ${ORDER_SERVICE_VERSION:-1.0.0}  # Версия приложения для меток в образе
        # ВНИМАНИЕ: Пароли НЕ передаём в ARGS! Они останутся в образе.
    container_name: order_service
    ports:
      - "${ORDER_SERVICE_PORT:-8081}:8081"           # Проброс порта наружу

    environment:
      SERVER_PORT: ${ORDER_SERVICE_PORT:-8081}

      # -----------------------------------------------------------------------
      # Подключение к БД (runtime)
      # -----------------------------------------------------------------------
      SPRING_DATASOURCE_URL: jdbc:postgresql://${ORDERS_POSTGRES_HOST}:5432/${ORDERS_POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${ORDERS_POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${ORDERS_POSTGRES_PASSWORD}  # Секрет!

      # -----------------------------------------------------------------------
      # Для миграций и прямых запросов (если нужно внутри приложения)
      # -----------------------------------------------------------------------
      POSTGRES_HOST: ${ORDERS_POSTGRES_HOST}
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${ORDERS_POSTGRES_DB}
      POSTGRES_USER: ${ORDERS_POSTGRES_USER}
      POSTGRES_PASSWORD: ${ORDERS_POSTGRES_PASSWORD}           # Секрет!

      # -----------------------------------------------------------------------
      # JPA настройки
      # -----------------------------------------------------------------------
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO}  # validate в production

    depends_on:
      orders-db-postgres:
        condition: service_healthy

    restart: unless-stopped

    healthcheck:
      # Проверка, что Spring Boot жив и отвечает
      test: [ "CMD", "curl", "-f", "http://localhost:8081/actuator/health" ]
      interval: 30s      # Реже, чем у БД (Spring Boot тяжелее стартует)
      timeout: 10s
      retries: 3
      start_period: 40s  # Даём время на запуск (первые 40с не проверяем)

    networks:
      - e-commerce-network



volumes:
  orders_postgres_data:
    name: e_comm_orders_data


networks:
  e-commerce-network:
    name: e-commerce-network
    driver: bridge