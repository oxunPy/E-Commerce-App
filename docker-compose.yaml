services:
  orders-db-postgres:
    image: postgres:15
    container_name: orders_db_postgres
    ports:
      - "${ORDERS_POSTGRES_PORT:-5433}:5432"

    environment:
      POSTGRES_USER: ${ORDERS_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${ORDERS_POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${ORDERS_POSTGRES_DB:-orders_db}

    volumes:
      - orders_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

    command:
      - "postgres"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "shared_buffers=256MB"      # Кэш в памяти (ускоряет запросы)
      - "-c"
      - "wal_level=logical"

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${ORDERS_POSTGRES_USER:-postgres} -d ${ORDERS_POSTGRES_DB:-orders_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - e-commerce-network

  order-service:
    build:
      context: .      # Текущая директория
      dockerfile: order-service/Dockerfile
      args:
        # Аргументы сборки (только метаинформация, НЕ секреты!)
        APP_VERSION: ${ORDER_SERVICE_VERSION:-1.0.0}  # Версия приложения для меток в образе
        # ВНИМАНИЕ: Пароли НЕ передаём в ARGS! Они останутся в образе.
    container_name: order_service
    ports:
      - "${ORDER_SERVICE_PORT:-8081}:8081"           # Проброс порта наружу

    environment:
      SERVER_PORT: ${ORDER_SERVICE_PORT:-8081}

      # -----------------------------------------------------------------------
      # Подключение к БД (runtime)
      # -----------------------------------------------------------------------
      SPRING_DATASOURCE_URL: jdbc:postgresql://${ORDERS_POSTGRES_HOST}:5432/${ORDERS_POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${ORDERS_POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${ORDERS_POSTGRES_PASSWORD}  # Секрет!

      # -----------------------------------------------------------------------
      # Для миграций и прямых запросов (если нужно внутри приложения)
      # -----------------------------------------------------------------------
      POSTGRES_HOST: ${ORDERS_POSTGRES_HOST}
      POSTGRES_DB: ${ORDERS_POSTGRES_DB}
      POSTGRES_USER: ${ORDERS_POSTGRES_USER}
      POSTGRES_PASSWORD: ${ORDERS_POSTGRES_PASSWORD}           # Секрет!

      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL}
      PAYMENT_SERVICE_URL: ${PAYMENT_SERVICE_URL}
      INVENTORY_SERVICE_URL: ${INVENTORY_SERVICE_URL}
    depends_on:
      orders-db-postgres:
        condition: service_healthy
      jaeger:
        condition: service_started

    restart: unless-stopped

    healthcheck:
      # Проверка, что Spring Boot жив и отвечает
      test: [ "CMD", "curl", "-f", "http://localhost:8081/actuator/health" ]
      interval: 30s      # Реже, чем у БД (Spring Boot тяжелее стартует)
      timeout: 10s
      retries: 3
      start_period: 40s  # Даём время на запуск (первые 40с не проверяем)

    networks:
      - e-commerce-network

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: prometheus_ecomm
    volumes:
      # Конфигурация Prometheus (скажем, куда ходить за метриками)
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # Данные метрик (чтобы не терять историю при перезапуске)
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'  # Храним метрики 15 дней (production standard)
    ports:
      - '9090:9090'  # UI Prometheus (только для отладки)
    depends_on:
      order-service:
        condition: service_started
    restart: unless-stopped
    networks:
      - e-commerce-network

  grafana:
    image: grafana/grafana:10.2.2
    container_name: grafana_ecomm
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    ports:
      - '3000:3000'
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - e-commerce-network

  jaeger:
    image: jaegertracing/all-in-one:1.52
    container_name: jaeger
    ports:
      - "16686:16686"  # UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP

    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      # Храним трассы в памяти (для демо), в production нужен persistent storage
      SPAN_STORAGE_TYPE: memory
    restart: unless-stopped
    networks:
      - e-commerce-network

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
      args:
        APP_VERSION: ${NOTIFICATION_SERVICE_VERSION:-1.0.0}

    container_name: notification_service

    environment:
      MONGO_USER: ${NOTIFICATIONS_MONGO_USER:-dbuser}
      MONGO_PASSWORD: ${NOTIFICATIONS_MONGO_PASSWORD:-dbpass}
      MONGO_HOST: ${NOTIFICATIONS_MONGO_HOST:-notifications-db-mongo}
      MONGO_PORT: ${NOTIFICATIONS_MONGO_PORT}

    ports:
      - "${NOTIFICATION_SERVICE_PORT:-8083}:8083"           # Проброс порта наружу


    depends_on:
      notifications-db-mongo:
        condition: service_healthy

    restart: unless-stopped

    healthcheck:
      # Проверка, что Spring Boot жив и отвечает
      test: [ "CMD", "curl", "-f", "http://localhost:8083/actuator/health" ]
      interval: 30s      # Реже, чем у БД (Spring Boot тяжелее стартует)
      timeout: 10s
      retries: 3
      start_period: 40s  # Даём время на запуск (первые 40с не проверяем)

    networks:
      - e-commerce-network

  notifications-db-mongo:
    image: mongo:7
    container_name: notifications_db_mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${NOTIFICATIONS_MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${NOTIFICATIONS_MONGO_PASSWORD:-admin}
      MONGO_INITDB_DATABASE: ${NOTIFICATIONS_MONGO_DB:-notifications_db}
    ports:
      - "${NOTIFICATIONS_MONGO_PORT:-27017}:27017"
    volumes:
      - notifications_mongo_data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - e-commerce-network

  elasticsearch:
    image: elasticsearch:9.0.1
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - e-commerce-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # =============================================================================
  # ELK СТЕК - структурированное логирование
  # =============================================================================
  elasticsearch-log:
    image: elasticsearch:8.11.0
    container_name: elasticsearch_log
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
      - xpack.monitoring.collection.enabled=true
      - "cluster.name=ecommerce-app-elk"
    ports:
      - "9201:9200"  # HTTP API
      - "9300:9300"  # Transport protocol
    volumes:
      - elasticsearch_log_data:/usr/share/elasticsearch/data
    restart: unless-stopped
    networks:
      - e-commerce-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9200/_cluster/health" ]
      interval: 30s
      timeout: 10s
      retries: 5

  # Elasticsearch Exporter для мониторинга в Prometheus
  elasticsearch-exporter:
    image: prometheuscommunity/elasticsearch-exporter:latest
    container_name: elasticsearch_exporter
    command:
      - '--es.uri=http://elasticsearch-log:9200'
      - '--es.all'                 # Собирать метрики со всех нод
      - '--es.indices'             # Собирать метрики по индексам
      - '--es.indices_settings'    # Собирать настройки индексов
      - '--es.shards'              # Собирать метрики по шардам
    ports:
      - "9114:9114"
    depends_on:
      elasticsearch-log:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - e-commerce-network

  logstash:
    image: logstash:8.11.0
    container_name: logstash
    ports:
      - "5000:5000"               # TCP input для логов
      - "9600:9600"               # Monitoring API
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
    environment:
      LS_JAVA_OPTS: "-Xms256m -Xmx256m"
      # Параметры подключения к Elasticsearch
      ELASTICSEARCH_HOSTS: "http://elasticsearch-log:9200"
    depends_on:
      elasticsearch-log:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - e-commerce-network

  kibana:
    image: kibana:8.11.0
    container_name: kibana
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: "http://elasticsearch-log:9200"
      # Локализация
      I18N_LOCALE: ru
      # Настройки по умолчанию
      KIBANA_DEFAULT_APP_ID: discover
      SERVER_NAME: kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - e-commerce-network

  # Опционально: Filebeat для сбора логов из файлов (альтернатива TCP)
  filebeat:
    image: elastic/filebeat:8.11.0
    container_name: filebeat
    user: root
    volumes:
      # Конфигурация Filebeat
      - ./filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      # Docker socket для чтения логов контейнеров
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Логи Docker
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: [ "--strict.perms=false" ]
    depends_on:
      elasticsearch:
        condition: service_healthy
      logstash:
        condition: service_started
    restart: unless-stopped
    networks:
      - e-commerce-network

  products-db-postgres:
    image: postgres:15
    container_name: products_db_postgres
    ports:
      - "${PRODUCTS_POSTGRES_PORT:-5434}:5432"

    environment:
      POSTGRES_USER: ${PRODUCTS_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${PRODUCTS_POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${PRODUCTS_POSTGRES_DB:-products_db}

    volumes:
      - products_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

    command:
      - "postgres"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "shared_buffers=256MB"      # Кэш в памяти (ускоряет запросы)
      - "-c"
      - "wal_level=logical"

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${PRODUCTS_POSTGRES_USER:-postgres} -d ${PRODUCTS_POSTGRES_DB:-products_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - e-commerce-network

  product-service:
    build:
      context: .
      dockerfile: product-service/Dockerfile
      args:
        APP_VERSION: ${PRODUCT_SERVICE_VERSION:-1.0.0}
    container_name: product_service
    ports:
      - "${PRODUCT_SERVICE_PORT:-8085}:8085"

    environment:
      ELASTIC_HOST: elasticsearch
      ELASTIC_PORT: 9200
      ELASTIC_USER: ${ELASTIC_USER:-admin}
      ELASTIC_PASSWOR: ${ELASTIC_PASSWORD:-admin}

      POSTGRES_HOST: ${PRODUCTS_POSTGRES_HOST}
      POSTGRES_DB: ${PRODUCTS_POSTGRES_DB}
      POSTGRES_USER: ${PRODUCTS_POSTGRES_USER}
      POSTGRES_PASSWORD: ${PRODUCTS_POSTGRES_PASSWORD}


    depends_on:
      elasticsearch:
        condition: service_healthy
      products-db-postgres:
        condition: service_healthy
      jaeger:
        condition: service_started

    restart: unless-stopped

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8085/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    networks:
      - e-commerce-network

  payments-db-postgres:
    image: postgres:15
    container_name: payments_db_postgres
    ports:
      - "${PAYMENTS_POSTGRES_PORT:-5435}:5432"

    environment:
      POSTGRES_USER: ${PAYMENTS_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${PAYMENTS_POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${PAYMENTS_POSTGRES_DB:-payments_db}

    volumes:
      - payments_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

    command:
      - "postgres"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "shared_buffers=256MB"      # Кэш в памяти (ускоряет запросы)
      - "-c"
      - "wal_level=logical"

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${PAYMENTS_POSTGRES_USER:-postgres} -d ${PAYMENTS_POSTGRES_DB:-payments_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - e-commerce-network

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
      args:
        APP_VERSION: ${PAYMENT_SERVICE_VERSION:-1.0.0}
    container_name: payment_service
    ports:
      - "${PAYMENT_SERVICE_PORT:-8084}:8084"

    environment:
      POSTGRES_HOST: ${PAYMENTS_POSTGRES_HOST}
      POSTGRES_DB: ${PAYMENTS_POSTGRES_DB}
      POSTGRES_USER: ${PAYMENTS_POSTGRES_USER}
      POSTGRES_PASSWORD: ${PAYMENTS_POSTGRES_PASSWORD}

      ORDER_SERVICE_URL: ${ORDER_SERVICE_URL}
      INVENTORY_SERVICE_URL: ${INVENTORY_SERVICE_URL}

    depends_on:
      payments-db-postgres:
        condition: service_healthy
      jaeger:
        condition: service_started

    restart: unless-stopped

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8084/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    networks:
      - e-commerce-network

  inventory-db-postgres:
    image: postgres:15
    container_name: inventory_db_postgres
    ports:
      - "${INVENTORY_POSTGRES_PORT:-5436}:5432"

    environment:
      POSTGRES_USER: ${INVENTORY_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${INVENTORY_POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${INVENTORY_POSTGRES_DB:-payments_db}

    volumes:
      - inventory_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

    command:
      - "postgres"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "shared_buffers=256MB"      # Кэш в памяти (ускоряет запросы)
      - "-c"
      - "wal_level=logical"

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${INVENTORY_POSTGRES_USER:-postgres} -d ${INVENTORY_POSTGRES_DB:-inventory_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - e-commerce-network

  inventory-service:
    build:
      context: .
      dockerfile: inventory-service/Dockerfile
      args:
        APP_VERSION: ${INVENTORY_SERVICE_VERSION:-1.0.0}
    container_name: inventory_service
    ports:
      - "${INVENTORY_SERVICE_PORT:-8082}:8082"

    environment:
      POSTGRES_HOST: ${INVENTORY_POSTGRES_HOST}
      POSTGRES_DB: ${INVENTORY_POSTGRES_DB}
      POSTGRES_USER: ${INVENTORY_POSTGRES_USER}
      POSTGRES_PASSWORD: ${INVENTORY_POSTGRES_PASSWORD}

      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}

    depends_on:
      inventory-db-postgres:
        condition: service_healthy
      jaeger:
        condition: service_started
      redis:
        condition: service_started

    restart: unless-stopped

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8082/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    networks:
      - e-commerce-network

  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --notify-keyspace-events Ex
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - e-commerce-network

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
      args:
        APP_VERSION: 1.0.0

    ports:
      - "8080:8080"
    container_name: api_gateway

    restart: unless-stopped
    networks:
      - e-commerce-network

networks:
  e-commerce-network:
    name: e-commerce-network
    driver: bridge


volumes:
  orders_postgres_data:
    name: e_comm_orders_data
  prometheus_data:
    name: e_comm_prometheus_data
  grafana_data:
    name: e_comm_grafana_data
  notifications_mongo_data:
    name: e_comm_notifications_data
  products_postgres_data:
    name: e_comm_products_data
  elasticsearch_data:
    name: e_comm_elasticsearch_data
  elasticsearch_log_data:
    name: e_comm_elasticsearch_log_data
  payments_postgres_data:
    name: e_comm_payments_data
  inventory_postgres_data:
    name: e_comm_inventory_data
  redis_data:
    name: e_comm_redis_data