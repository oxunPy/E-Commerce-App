# =============================================================================
# LOGSTASH - ОСНОВНАЯ КОНФИГУРАЦИЯ СЕРВЕРА
# =============================================================================
# Этот файл (logstash.yml) управляет работой самого Logstash, а не пайплайнами.
# Все параметры, описанные ниже, реально существуют в Logstash 7.x и 8.x,
# но их поведение может зависеть от версии, наличия лицензии Elastic,
# включённой безопасности (security) и способа развёртывания (Docker/bare-metal).
# =============================================================================

# -----------------------------------------------------------------------------
# HTTP API - ДЛЯ МОНИТОРИНГА И УПРАВЛЕНИЯ
# -----------------------------------------------------------------------------
# Logstash запускает встроенный HTTP-сервер для:
# - Мониторинга состояния (метрики, статистика)
# - Управления пайплайнами через API
# - Получения информации о ноде

http.host: "0.0.0.0"
# -------------------------------------------------------------------------
# Что это: IP-адрес, на котором Logstash будет слушать HTTP-запросы.
# Значение "0.0.0.0" заставляет слушать на всех сетевых интерфейсах.
# В Docker это необходимо, чтобы API было доступно с хоста.
# Проверка: curl http://localhost:9600/_node
#
# Варианты:
# - "0.0.0.0"      # На всех интерфейсах (для Docker)
# - "localhost"    # Только локально (безопаснее, но не извне)
# - "192.168.1.10" # На конкретном IP
# - "127.0.0.1"    # Только локальный (по умолчанию)

# -------------------------------------------------------------------------
# ДОПОЛНИТЕЛЬНЫЕ НАСТРОЙКИ HTTP API
# -------------------------------------------------------------------------
# http.port: 9600-9700       # Порт (можно диапазон, по умолчанию 9600)
# http.port: 9600            # Конкретный порт

# Включить SSL для HTTP API (требуется настроить сертификаты)
# http.ssl.enabled: true
# http.ssl.certificate: /path/to/cert.pem
# http.ssl.key: /path/to/key.pem

# HTTP AUTH (basic auth) – НЕ РАБОТАЕТ «ИЗ КОРОБКИ»
# В Logstash нет встроенной basic-аутентификации для HTTP API.
# Для её включения необходимо:
#   - Использовать Elastic Stack Security (платная лицензия или базовая,
#     но с включённой безопасностью в Elasticsearch)
#   - Настроить x-pack.security в кластере
#   - Использовать соответствующие плагины или прокси (nginx) для аутентификации.
# Поэтому строки типа http.auth.* бесполезны без дополнительной инфраструктуры.

# Что можно получить по HTTP API:
# --------------------------------
# curl http://localhost:9600/_node/stats        # Статистика ноды
# curl http://localhost:9600/_node/pipelines     # Информация о пайплайнах
# curl http://localhost:9600/_node/hot_threads   # Горячие потоки
# curl http://localhost:9600/_node                # Общая информация

# -----------------------------------------------------------------------------
# МОНИТОРИНГ LOGSTASH В ELASTICSEARCH (X-PACK)
# -----------------------------------------------------------------------------
# Эти настройки позволяют Logstash отправлять свои метрики в Elasticsearch
# (так называемый "self-monitoring" или "x-pack monitoring").
# В версиях 8.x мониторинг работает, но требует включения security
# и правильной аутентификации.

xpack.monitoring.elasticsearch.hosts: [ "http://elasticsearch-log:9200" ]
# -------------------------------------------------------------------------
# Что это: Адрес(а) Elasticsearch для отправки метрик самого Logstash.
# Зачем: Чтобы видеть в Kibana (Stack Monitoring) как работает Logstash:
#        - загруженность, количество событий, ошибки, задержки.
#
# Формат: массив адресов.
# Варианты:
#   - [ "http://elasticsearch:9200" ]
#   - [ "https://elasticsearch-prod:9200" ]
#   - [ "http://10.0.0.1:9200", "http://10.0.0.2:9200" ]
#
# ВНИМАНИЕ: в 8.x для работы мониторинга необходимо:
#   - Установить xpack.monitoring.enabled: true (по умолчанию может быть false)
#   - Включить security в Elasticsearch (даже для базовой лицензии)
#   - Предоставить учётные данные (username/password) или настроить доверие
#   - Без этого метрики могут не отправляться.
#
# Пример с аутентификацией:
# xpack.monitoring.elasticsearch.username: "logstash_system"
# xpack.monitoring.elasticsearch.password: "password"
#
# Если security отключена, мониторинг может не работать.

# Дополнительные параметры мониторинга:
# xpack.monitoring.enabled: true           # Включить мониторинг (по умолчанию true в некоторых версиях, но лучше указать явно)
# xpack.monitoring.collection.interval: 10s   # Интервал сбора метрик
# xpack.monitoring.elasticsearch.ssl.certificate_authority: "/path/to/ca.crt"
# xpack.monitoring.elasticsearch.ssl.verification_mode: "certificate"
# xpack.monitoring.elasticsearch.index: ".monitoring-logstash-8"

# -------------------------------------------------------------------------
# ЧТО ПОЯВИТСЯ В KIBANA
# -------------------------------------------------------------------------
# После включения мониторинга в Kibana появится раздел:
# Stack Monitoring → Logstash
# Там можно увидеть: throughput, latency, список нод, детали пайплайнов,
# количество обработанных событий.

# -----------------------------------------------------------------------------
# ДРУГИЕ ВАЖНЫЕ НАСТРОЙКИ LOGSTASH
# -----------------------------------------------------------------------------

# -------------------------------------------------------------------------
# NODE.NAME - ИМЯ НОДЫ В КЛАСТЕРЕ
# -------------------------------------------------------------------------
# node.name: "logstash-orderhub"
# По умолчанию: hostname. Используется для идентификации в мониторинге.

# -------------------------------------------------------------------------
# PATH.DATA - ГДЕ ХРАНИТЬ ДАННЫЕ
# -------------------------------------------------------------------------
# path.data: /usr/share/logstash/data
# Здесь хранятся: очереди (queue), dead letter queues, persistent queues.

# -------------------------------------------------------------------------
# PIPELINE - НАСТРОЙКИ ПАЙПЛАЙНОВ ПО УМОЛЧАНИЮ
# -------------------------------------------------------------------------
# pipeline.workers: 24               # Потоков на пайплайн. По умолчанию = число CPU.
# pipeline.batch.size: 125           # Событий в пачке (по умолчанию 125).
# pipeline.batch.delay: 50           # Задержка перед отправкой (мс).
# pipeline.unsafe_shutdown: false    # Принудительное завершение (не рекомендуется).

# -------------------------------------------------------------------------
# QUEUE - НАСТРОЙКИ ОЧЕРЕДЕЙ (ДЛЯ НАДЕЖНОСТИ)
# -------------------------------------------------------------------------
# queue.type: memory                  # memory (быстро, но не сохраняется при перезапуске)
# queue.type: persisted                # сохраняет очередь на диск (надёжно)
# queue.max_bytes: 1gb                  # максимальный размер очереди
# queue.drain: false                     # очищать очередь при остановке

# -------------------------------------------------------------------------
# DEAD LETTER QUEUE - ДЛЯ НЕОБРАБОТАННЫХ СОБЫТИЙ
# -------------------------------------------------------------------------
# dead_letter_queue.enable: false
# dead_letter_queue.max_bytes: 1024mb
# Работает только для некоторых output-плагинов (например, elasticsearch).

# -------------------------------------------------------------------------
# LOGGING - ЛОГИРОВАНИЕ САМОГО LOGSTASH
# -------------------------------------------------------------------------
# В Logstash 8.x рекомендуется использовать:
# log.level: info
# log.format: json                     # логи в JSON (для сбора Filebeat)
#
# Параметр logging.format (или logging.json) устарел. Правильный ключ: log.format.
#
# Пример:
# log.level: info
# log.format: json
#
# Также можно настроить логирование отдельных компонентов:
# log.loggers: [ "logstash.javapipeline" ]

# -------------------------------------------------------------------------
# CONFIG - КОНФИГУРАЦИЯ ПАЙПЛАЙНОВ
# -------------------------------------------------------------------------
# config.reload.automatic: false       # автоперезагрузка при изменении файлов
# config.reload.interval: 3s            # проверять каждые 3 секунды
# config.test_and_exit: false           # проверить конфиг и выйти
# config.debug: false                   # дебаг-режим конфигурации
# В Docker эти опции обычно отключают.

# - Всегда сверяйтесь с официальной документацией вашей версии Logstash:
#   https://www.elastic.co/guide/en/logstash/current/logstash-configuration-file.html
#
# Минимальная рабочая конфигурация для Docker (без security):
# http.host: "0.0.0.0"
# xpack.monitoring.elasticsearch.hosts: [ "http://elasticsearch:9200" ]
# (мониторинг может не работать, если security не включена)
#
# Для production с безопасностью добавляйте аутентификацию и SSL.
# =============================================================================